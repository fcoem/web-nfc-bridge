name: release-installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
          - os: windows-latest
            platform: windows-x64
          - os: windows-latest
            platform: windows-arm64
          - os: ubuntu-latest
            platform: linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PC/SC development headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"

      - name: Build installer
        run: node ./scripts/build-installers.mjs --platform ${{ matrix.platform }} --version ${{ inputs.version || github.ref_name }} --output-dir artifacts/installers

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          if-no-files-found: error
          path: |
            artifacts/installers/*.pkg
            artifacts/installers/*.msi
            artifacts/installers/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.pkg
            release-artifacts/**/*.msi
            release-artifacts/**/*.deb
